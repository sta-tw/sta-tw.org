services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sta
      POSTGRES_USER: sta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stapassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "12005:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sta -d sta"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "12006:6379"
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilidev}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "12004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sta:${POSTGRES_PASSWORD:-stapassword}@postgres:5432/sta
      REDIS_URL: redis://redis:6379
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilidev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:12003}
      DEBUG: ${DEBUG:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      EXTRA_CORS_ORIGINS: ${EXTRA_CORS_ORIGINS:-}
    volumes:
      - local_uploads:/tmp/sta_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "12003:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:8000}
    restart: unless-stopped

volumes:
  postgres_data:
  meili_data:
  local_uploads:
